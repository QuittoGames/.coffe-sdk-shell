# ============================================
# Coffee SDK — Dependencies
# ============================================
# Pacotes dnf + dependências não-dnf.
#
# Instalar via dnf:
#   sudo dnf install $(cat)
# ============================================

PACKAGES="
# Shell runtime
bash
coreutils
findutils
sed
gawk
util-linux

# Git module
git

# Search module / FZF UI
fzf
fd-find
ripgrep
bat
eza

# JSON parser (info.json, configs)
jq

# Clipboard module (Wayland)
wl-clipboard
"

# ============================================
# Dependências não-dnf (instaladas por outros meios)
# ============================================
# Formato: caminho absoluto que deve existir se o pacote estiver instalado
# packages.sh checa tanto rpm -q quanto a existência do path.
NON_DNF=(
  "oh-my-bash:$HOME/.oh-my-bash"
)
